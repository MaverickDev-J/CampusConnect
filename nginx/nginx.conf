# ══════════════════════════════════════════════════════════════
# CampusConnect — Nginx Reverse Proxy Configuration
# ══════════════════════════════════════════════════════════════
# Routes:
#   /api/*      → backend:8000
#   /ws/*       → backend:8000 (WebSocket upgrade)
#   /health     → backend:8000
#   /static/*   → Direct file serving (uploaded PDFs/images)
#   /flower/*   → flower:5555 (Celery monitoring)
#   /*          → frontend:3000

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

upstream flower {
    server flower:5555;
}

server {
    listen 80;
    server_name _;

    # Max upload size (match backend's file upload limit)
    client_max_body_size 50M;

    # ── API routes → Backend ──────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (disable buffering for streaming responses)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── Health check → Backend ────────────────────────────────
    location /health {
        proxy_pass http://backend;
    }

    # ── OpenAPI docs → Backend ────────────────────────────────
    location /docs {
        proxy_pass http://backend;
    }
    location /openapi.json {
        proxy_pass http://backend;
    }

    # ── WebSocket → Backend ───────────────────────────────────
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;  # Keep WS open for 24h
        proxy_send_timeout 86400s;
    }

    # ── Static files (uploaded documents) ─────────────────────
    # Served directly by Nginx — much faster than Python
    location /static/ {
        alias /static/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Flower monitoring dashboard ───────────────────────────
    location /flower/ {
        proxy_pass http://flower/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Everything else → Frontend ────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
